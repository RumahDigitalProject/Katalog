<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katalog Undangan Digital Modern</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3498db;
      --secondary: #f3a302;
      --success: #27ae60;
      --bg: #f4f7f6;
      --text: #333;
    }

    body { 
      font-family: 'Poppins', sans-serif; 
      background: var(--bg); 
      color: var(--text);
      margin: 0;
      padding: 20px; 
    }

    h2 {
      font-weight: 600;
      margin-bottom: 30px;
      color: #2c3e50;
    }

    /*=== Filter Styling ===*/
    .filter-box {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .filter-btn, .btn-kat {
      padding: 10px 20px;
      background: white;
      color: var(--primary);
      border: 2px solid var(--primary);
      border-radius: 50px;
      font-size: 14px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--primary);
      color: white;
    }

    /* ==== Grid Layout ==== */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr); /* Tetap 2 kolom di HP */
      gap: 15px;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Desktop View: Jadi 3 atau 4 kolom */
    @media (min-width: 768px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ==== Card Item ==== */
    .item {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .item:hover {
      transform: translateY(-5px);
    }

    .img-container {
      width: 100%;
      aspect-ratio: 4/3; /* Memastikan semua gambar punya ukuran sama */
      overflow: hidden;
      background: #eee;
    }

    .item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-content {
      padding: 15px;
      text-align: center;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .katalog {
      font-family: 'Great Vibes', cursive;
      font-size: 22px;
      color: var(--secondary);
      margin-bottom: 5px;
    }

    .harga {
      font-size: 16px;
      font-weight: 600;
      color: var(--success);
      margin-bottom: 15px;
    }

    /* ==== Buttons ==== */
    .btn-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .btn-group button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .btn-preview { background: #ebf5fb; color: var(--primary); }
    .btn-pesan { background: var(--primary); color: white; }
    .btn-group button:hover { opacity: 0.8; }

    /* POPUP MODAL */
    .popup-bg { 
      position: fixed; top:0; left:0; width:100%; height:100%; 
      background: rgba(0,0,0,0.7); 
      display:none; justify-content:center; align-items:center; 
      z-index: 1000; padding: 20px;
    }
    .popup-box { 
      width: 100%; max-width: 500px; 
      background:white; padding:25px; border-radius:20px; 
      display:block; text-align: center;
    }
    .popup-box img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 12px; margin-bottom: 15px;}
    .form input { width:100%; padding:12px; margin-bottom:12px; border-radius:8px; border:1px solid #ddd; box-sizing: border-box;}
    
    .btn-wa { width: 100%; background: #25d366; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px;}
    .close { color: #888; cursor: pointer; font-size: 14px; text-decoration: underline; }
  </style>
</head>
<body>

  <h2 style="text-align:center;">Pilih Desain Undanganmu</h2>

  <div class="filter-box">
    <button class="filter-btn" onclick="filterKategori('all')">Semua</button>
    <button class="filter-btn" onclick="filterKategori('premium')">Premium</button>
    <button class="filter-btn" onclick="filterKategori('sedang')">Sedang</button>
    <button class="filter-btn" onclick="filterKategori('low')">Minimalis</button>
  </div>

  <div class="grid">
    <div class="item" data-category="premium" data-name="Undangan JAWA" data-price="Rp 50.000" data-preview="#">
      <div class="img-container">
        <img src="https://via.placeholder.com/400x300" alt="Jawa">
      </div>
      <div class="card-content">
        <div>
          <div class="katalog">Jawa Series</div>
          <div class="harga">Rp 50.000</div>
        </div>
        <div class="btn-group">
          <button class="btn-preview" onclick="preview(this)">Preview</button>
          <button class="btn-pesan" onclick="pesan(this)">Pesan</button>
        </div>
      </div>
    </div>

    <div class="item" data-category="low" data-name="Undangan Modern" data-price="Rp 80.000" data-preview="#">
      <div class="img-container">
        <img src="https://via.placeholder.com/400x300" alt="Modern">
      </div>
      <div class="card-content">
        <div>
          <div class="katalog">Modern Minimalis</div>
          <div class="harga">Rp 80.000</div>
        </div>
        <div class="btn-group">
          <button class="btn-preview" onclick="preview(this)">Preview</button>
          <button class="btn-pesan" onclick="pesan(this)">Pesan</button>
        </div>
      </div>
    </div>
    
    </div>

  <div class="popup-bg" id="popup">
    <div class="popup-box">
      <img id="popup-img" src="" alt="Preview" />
      <h3 id="popup-title" style="margin-top:0">Form Pemesanan</h3>
      <div class="form">
        <input type="date" id="tanggal" />
        <input type="text" id="nama" placeholder="Nama Panggilan Pengantin" />
        <p id="popup-harga" style="font-weight: bold; color: var(--success);"></p>
        <button class="btn-wa" onclick="kirimWa()">Pesan via WhatsApp</button>
        <div class="close" onclick="closePopup()">Kembali</div>
      </div>
    </div>
  </div>

<script>
  let namaKatalog = '';
  let hargaKatalog = '';

  function filterKategori(kat){
    const items = document.querySelectorAll('.item');
    items.forEach(item => {
      const kategori = item.dataset.category || '';
      item.style.display = (kat === 'all' || kategori === kat) ? 'flex' : 'none';
    });
    
    // Ubah status aktif tombol
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.remove('active');
      if(btn.textContent.toLowerCase() === kat || (kat === 'all' && btn.textContent === 'Semua')) {
        btn.classList.add('active');
      }
    });
  }

  function preview(btn){
    const item = btn.closest('.item');
    window.open(item.dataset.preview, '_blank');
  }

  function pesan(btn){
    const item = btn.closest('.item');
    namaKatalog = item.dataset.name;
    hargaKatalog = item.dataset.price;

    document.getElementById('popup-img').src = item.querySelector('img').src;
    document.getElementById('popup-harga').textContent = "Harga: " + hargaKatalog;
    document.getElementById('popup-title').textContent = namaKatalog;
    document.getElementById('popup').style.display = 'flex';
  }

  function closePopup(){
    document.getElementById('popup').style.display = 'none';
  }

  function kirimWa(){
    const tgl = document.getElementById('tanggal').value;
    const nama = document.getElementById('nama').value;

    if(!tgl || !nama){
      alert('Harap isi Nama dan Tanggal!');
      return;
    }

    const teks = `Halo Admin, saya ingin pesan undangan:\n\n*Produk:* ${namaKatalog}\n*Harga:* ${hargaKatalog}\n*Nama:* ${nama}\n*Tanggal:* ${tgl}`;
    const url = `https://wa.me/6285706889273?text=${encodeURIComponent(teks)}`;
    window.open(url, '_blank');
  }
</script>
</body>
</html>
